name: Fiyat Botu

on:
  schedule:
    - cron: '0 */2 * * *' (Bu her 2 saatte bir anlamına geliyor)
  workflow_dispatch: # Manuel tetikleme butonu

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 playwright

    - name: Playwright Tarayıcılarını Yükle
      run: playwright install chromium

    - name: Botu Çalıştır (Crawler)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python crawler.py

    - name: Veritabanını Kaydet (Git Commit)
      run: |
        git config --global user.name "Fiyat Botu"
        git config --global user.email "bot@fiyatbotu.com"
        git add products.db
        git commit -m "Fiyatlar güncellendi" || exit 0
        git push
